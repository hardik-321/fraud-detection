<!DOCTYPE html>
<html>
<head>
    <title>AI Fraud Detection Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            background: #1d2671;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #c33764;
        }

        #result {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
            margin-top: 10px;
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1d2671;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .low { background: green; }
        .medium { background: orange; }
        .high { background: red; }

    </style>
</head>

<body>

<div class="container">
    <h1>💳 Fraud Detection</h1>

    <input type="number" id="amount" placeholder="Enter Amount">
    <input type="number" id="time" placeholder="Enter Time">
    <input type="text" id="type" placeholder="Type (UPI/Card/International)">

    <button onclick="checkFraud()">Check Transaction</button>
    <button onclick="loadHistory()">View Transaction History</button>

    <div id="historyTable" style="
        margin-top:20px;
        max-height:300px;
        overflow-y:auto;
        border:1px solid #ccc;
        padding:10px;
    "></div>
    <div id="result" style="display:none;"></div>
</div>

<script>
async function checkFraud() {
  const amount = document.getElementById("amount").value;
  const time = document.getElementById("time").value;
  const type = document.getElementById("type").value;

  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "⏳ Analyzing transaction...";

  try {
    const response = await fetch("https://fraud-detection-mdbv.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount: amount,
        time: time,
        type: type
      })
    });

    const data = await response.json();

    resultDiv.innerHTML = `
      <div style="
        padding: 15px;
        border-radius: 10px;
        background-color: ${data.fraud ? '#ff4d4d' : '#4CAF50'};
        color: white;
        text-align: center;
      ">
        ${data.fraud ? "❌ FRAUD DETECTED" : "✅ SAFE TRANSACTION"}
      </div>
    `;

  } catch (error) {
    console.error(error);
    resultDiv.innerHTML = "❌ Error connecting to server";
  }
  resultDiv.style.display = "block";
}

async function loadHistory() {
  const resultDiv = document.getElementById("result");

  resultDiv.style.display = "block";
  resultDiv.innerHTML = "⏳ Loading history...";

  try {
    const response = await fetch("https://fraud-detection-mdbv.onrender.com/history");
    const data = await response.json();

    if (data.length === 0) {
      resultDiv.innerHTML = "No transactions found.";
      return;
    }

    let table = `
      <div style="max-height: 300px; overflow-y: auto;">
      <table style="width:100%; border-collapse: collapse; text-align: center;">
        <tr style="background-color:#333; color:white;">
          <th>Amount</th>
          <th>Time</th>
          <th>Type</th>
          <th>Status</th>
        </tr>
    `;

    data.forEach(tx => {
      table += `
        <tr>
          <td>${tx.amount}</td>
          <td>${tx.time}</td>
          <td>${tx.type}</td>
          <td style="color:${tx.fraud ? 'red' : 'green'}; font-weight:bold;">
            ${tx.fraud ? "FRAUD" : "SAFE"}
          </td>
        </tr>
      `;
    });

    table += `</table></div>`;

resultDiv.style.display = "block";

resultDiv.innerHTML = `
  <div style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
  ">

    <div style="
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
      max-height: 400px;
      overflow-y: auto;
      position: relative;
    ">

      <button onclick="closeHistory()" style="
        position:absolute;
        top:10px;
        right:10px;
        background:red;
        color:white;
        border:none;
        padding:5px 10px;
        cursor:pointer;
        border-radius:5px;
      ">✖</button>

      <h3 style="text-align:center;">Transaction History</h3>

      ${table}

    </div>

  </div>
`;

  } catch (error) {
    console.error(error);
    resultDiv.innerHTML = "❌ Error loading history";
  }
}

function closeHistory() {
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "none";
  resultDiv.innerHTML = "";
}
</script>

</body>
</html>
